          "name": "What is boiler feed pump head calculation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A boiler feed pump head calculation determines the Total Dynamic Head (TDH) required to force water into the steam drum. Mathematically, BFP head calculation is: TDH = [(P_discharge - P_suction) × C / SG] + Hz + Hf_suction + Hf_discharge + Hv. Here, P_discharge measures boiler operating pressure plus control valve drops; P_suction is the deaerator vessel pressure; C is the unit constant; SG is the feedwater specific gravity; Hz represents static elevation; Hf stands for piping friction resistance losses; and Hv is the velocity acceleration head."
          }
        },
        {
          "@type": "Question",
          "name": "How to calculate boiler feed pump power?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "To calculate boiler feed pump power, first solve for the hydraulic fluid power: Hydraulic Power (kW) = [Volumetric Flow (m³/s) × TDH (m) × Hot Water Density (kg/m³) × g] / 1000. Under mechanical design parameters, the actual shaft brake power (BHP) is computed as: Brake Power = Hydraulic Power / Pump Mechanical Efficiency. Finally, determine electric motor nameplate power: Motor Power = Brake Power / Motor Efficiency × Driver Safety Margin (typically 1.10 to 1.15)."
          }
        },
        {

          "name": "What is boiler feed pump efficiency?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Boiler feed pump efficiency represents the efficiency parameter (hydraulic power output divided by shaft mechanical brake horsepower Input). Feed pump efficiency calculation typically ranges between 65% and 85% at the Best Efficiency Point (BEP). Operating a feed pump far to the left of its BEP causes intensive recirculation heat, high hub vibration, dynamic stress on the boiler feed pump bearing, and severe electrical waste."
          }
        },
        {

          "name": "How do you select a boiler feed pump?",
          "acceptedAnswer": {

            "text": "For a precise boiler feed pump selection calculation, you start by executing a boiler feed pump design calculation targeting three critical operational profiles: (1) design volumetric flow rate factoring in density and blowdowns, (2) Total Dynamic Head incorporating piping resistances, and (3) Net Positive Suction Head Available (NPSHa). For high-pressure utilities over 100 bar, you select API 610 BB4 radially split ring-section multistage or BB5 double-case barrel-cased configurations."
          }

          }
