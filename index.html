          "name": "What is the formula for boiler feed pump calculation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The main formula is TDH = (Pd - Ps) × 10.2 + ΔHv + Hf_suction + Hf_discharge + Hz, where Pd is discharge pressure in bar, Ps is suction pressure in bar, ΔHv is velocity head difference, Hf is friction losses, and Hz is static head — all in meters of water column."
          }
        },
        {
          "@type": "Question",
          "name": "How do I calculate the power required for a boiler feed pump?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hydraulic Power (kW) = (ρ × g × Q × H) / 1000. Divide by pump efficiency to get shaft power, then divide by motor efficiency for motor input power."
          }
        },
        {
          "@type": "Question",
          "name": "What is NPSH in boiler feed pump calculation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NPSH (Net Positive Suction Head) Available = atmospheric pressure head + suction static head − friction losses in suction pipe − vapor pressure head of the liquid at pumping temperature. Always maintain NPSHa > NPSHr + safety margin."
          }
        },
        {
          "@type": "Question",
          "name": "How to calculate boiler feed pump flow rate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Required Flow = Evaporation Rate × (1 + Blowdown%/100) × Safety Factor. Convert kg/hr to m³/hr by dividing by water density at feed temperature."
          }
        },
        {
          "@type": "Question",
          "name": "What safety factor is used in boiler feed pump sizing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typically 10-15% over the calculated flow is used as safety margin. For critical applications in power plants, 20% margin is recommended."
          }
        },
        {
          "@type": "Question",
          "name": "How does water temperature affect boiler feed pump calculation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Higher temperature reduces water density and lowers NPSH available. At 105°C, water density is ~955 kg/m³ vs 1000 kg/m³ at 20°C. The vapor pressure also increases significantly, reducing NPSHa."
          }
        },
        {
          "@type": "Question",
          "name": "What is specific speed in pump selection?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Specific Speed Ns = N × √Q / H^0.75. It helps select the right impeller design. Ns 500-2000 = centrifugal (low flow, high head), Ns 2000-5000 = mixed flow, Ns 5000+ = axial flow."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between single-stage and multi-stage boiler feed pumps?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Single-stage pumps handle heads up to ~250m, suitable for small boilers. Multi-stage pumps (2-15 stages) handle 300-2500m head for medium to large power plants and process industries."
          }
        }
