          "name": "How do you calculate boiler feed pump head?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "To calculate boiler feed pump head, you sum the Static Head (the vertical height from the water source to the boiler entry), the Friction Loss (flow resistance in pipes, valves, and fittings), and the Velocity Head (kinetic energy of flow). Finally, add a safety margin (typically 10-20%) to account for system wear, scaling, and transients. The mathematical equation is Total Dynamic Head (TDH) = Static Head + Friction Losses + Velocity Head + Safety Factor."
          }
        },
        {
          "@type": "Question",
          "name": "What is the formula for boiler feed pump flow rate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The required boiler feed pump flow rate is calculated based on the maximum steam generation capacity of the boiler, plus allowances for blowdown and makeup water. The equation is Boiler Feed Pump Capacity = Boiler Maximum Continuous Rating (MCR) * (1 + Blowdown Rate % + Makeup Water Factor %). Blowdown factor accounts for solids removal, while makeup factor offsets steam/condensate losses."
          }
        },
        {
          "@type": "Question",
          "name": "How to calculate boiler feed pump power consumption?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "To find motor input power, compute Hydraulic Power = (Flow Rate [m³/h] * TDH [m] * Density [kg/m³] * g) / 3,600,000. Shaft Power = Hydraulic Power / Pump Efficiency. Finally, Motor Power = Shaft Power / Motor Efficiency. These results provide engineers with the electrical input needed to size cables, starters, and breakers safely."
          }
        },
        {
          "@type": "Question",
          "name": "What is NPSH in boiler feed pump calculation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Net Positive Suction Head (NPSH) represents the margin against cavitation. NPSH Available (NPSHa) is the absolute pressure at the suction port minus the fluid vapor pressure, which must exceed the pump's NPSH Required (NPSHr) by at least 1.5 to 2.0 meters. Low NPSH leads to vapor bubble formation, cavitation erosion, and mechanical failure."
          }
        },
        {
          "@type": "Question",
          "name": "How to calculate boiler feed pump efficiency?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pump efficiency is defined as energy transferred to the fluid divided by the mechanical power supplied to the pump shaft. It is typically determined through pump curve testing under standard ISO 9906. Hydraulic efficiency drops when operating far from the Best Efficiency Point (BEP). Modern multistage centrifugal pumps achieve efficiencies between 65% and 85%."
          }
        },
        {
          "@type": "Question",
          "name": "What size boiler feed pump do I need?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sizing requires identifying the boiler steam output, operating pressure, water temperature, and piping path. The pump must be rated for at least 110-120% of maximum boiler flow rate (MCR) to satisfy transient demands, and deliver pressure higher than the boiler safety valve set pressure, factoring in all upstream piping friction losses."
          }
        }
      ]
