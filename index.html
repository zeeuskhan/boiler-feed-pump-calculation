          "name": "How do you calculate boiler feed pump capacity?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Boiler feed pump capacity is calculated by converting the boiler's Maximum Continuous Rating (MCR) steam flow rate to volumetric flow, factoring in water density at operating temperature, continuous blowdown rate (2% to 5%), secondary system steam losses, and a standard engineering flow safety margin (usually 10% to 15%)."
          }
        },
        {
          "@type": "Question",
          "name": "Why is boiler feed pump sizing important?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Correct boiler feed pump sizing is important because under-sized pumps lead to a dry boiler and low-water safety trips, while over-sized pumps waste excessive motor driver electrical power, degrade control valves due to throttling drops, and put unnecessary stress on the boiler feed pump bearings."
          }
        },
        {
          "@type": "Question",
          "name": "What is boiler feed pump head calculation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A boiler feed pump head calculation determines the Total Dynamic Head (TDH) required to force water into the steam drum. Mathematically, BFP head calculation is: TDH = [(P_discharge - P_suction) × C / SG] + Hz + Hf_suction + Hf_discharge + Hv. Here, P_discharge measures boiler operating pressure plus control valve drops; P_suction is the deaerator vessel pressure; C is the unit constant; SG is the feedwater specific gravity; Hz represents static elevation; Hf stands for piping friction resistance losses; and Hv is the velocity acceleration head."
          }
        },
        {
          "@type": "Question",
          "name": "How to calculate boiler feed pump power?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "To calculate boiler feed pump power, first solve for the hydraulic fluid power: Hydraulic Power (kW) = [Volumetric Flow (m³/s) × TDH (m) × Hot Water Density (kg/m³) × g] / 1000. Under mechanical design parameters, the actual shaft brake power (BHP) is computed as: Brake Power = Hydraulic Power / Pump Mechanical Efficiency. Finally, determine electric motor nameplate power: Motor Power = Brake Power / Motor Efficiency × Driver Safety Margin (typically 1.10 to 1.15)."
          }
        },
        {
          "@type": "Question",
          "name": "What is NPSH in boiler feed pump calculation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In boiler feed pump npsh calculation, Net Positive Suction Head represents the net pressure envelope at the pump inlet above the water's boiling vapor pressure. Because boiler feed water enters near its boiling temperature, its static vapor pressure is extremely high. To prevent vapor bubble collapse (cavitation), you must elevate the deaerator tank to generate static height (Hz). Sizing must ensure NPSH Available (NPSHa) exceeds the pump's Required NPSH (NPSHr) by at least 1.5 to 2.0 meters."
          }
        }
      ]
    }
